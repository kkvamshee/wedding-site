<!-- public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="120" height="120" fill="#0a0a0a"/>
  
  <!-- Elegant border frame
  <rect x="10" y="10" width="80" height="80" 
        fill="none" 
        stroke="#fff" 
        stroke-width="2"/> -->
  
  <!-- VS in classic serif -->
  <text x="50" y="68" 
        font-family="'Playfair Display', 'Georgia', serif" 
        font-size="70" 
        fill="#fff" 
        text-anchor="middle" 
        font-weight="400"
        letter-spacing="-1">VS</text>
  
  <!-- Small gold accent dot -->
  <circle cx="50" cy="82" r="1.5" fill="#FFD700"/>
</svg>